<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2KZ | Records</title>
    <link rel="icon" type="image/x-icon" href="app.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search map..." autocomplete="off">
            <select id="tierFilter">
                <option value="all">All Tiers</option>
                <option value="1">Tier 1</option>
                <option value="2">Tier 2</option>
                <option value="3">Tier 3</option>
                <option value="4">Tier 4</option>
                <option value="5">Tier 5</option>
                <option value="6">Tier 6</option>
                <option value="7">Tier 7</option>
                <option value="8">Tier 8</option>
            </select>
        </div>
        <div class="stats-grid" id="cards-container">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalMapName"></h2>
            <div class="table-wrapper">
                <table id="leaderboardTable">
                    <thead>
                        <tr><th>Player</th><th>Time</th><th>Teleports</th><th>Date</th></tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
