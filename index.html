<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZ Статистика сервера</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏆 KZ Рекорды (Overall)</h1>
        <div class="stats-grid" id="cards-container">
            <div class="loading">Загрузка рекордов...</div>
        </div>
        <h2>📋 Таблица лучших времен</h2>
        <div class="table-wrapper">
            <table id="records-table">
                <thead>
                    <tr><th>Карта</th><th>Лучшее время</th><th>Телепорты</th></tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="3">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
